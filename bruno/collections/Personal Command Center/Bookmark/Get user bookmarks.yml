info:
  name: Get user bookmarks
  type: http
  seq: 2

http:
  method: GET
  url: "{{BASE_URL}}/bookmarks?collectionId={{COLLECTION_ID}}"
  params:
    - name: collectionId
      value: "{{COLLECTION_ID}}"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
